<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodboard Mixer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --surface: #141420;
      --surface2: #1e1e30;
      --border: #2a2a40;
      --text: #e8e6f0;
      --text2: #9896a8;
      --accent: #c4a1ff;
      --accent2: #ff7eb3;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* ─── Top Bar ─── */
    .topbar { display: flex; align-items: center; gap: 16px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; flex-shrink: 0; }
    .search-wrap { flex: 1; max-width: 400px; position: relative; }
    .search-input { width: 100%; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: #555; }
    .dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; z-index: 50; display: none; }
    .dropdown.open { display: block; }
    .drop-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; font-size: 14px; color: var(--text); transition: background 0.15s; }
    .drop-item:hover { background: var(--surface2); }
    .drop-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .drop-none { padding: 14px; color: #555; font-size: 13px; text-align: center; }
    .shuffle-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(196,161,255,0.2); background: transparent; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; flex-shrink: 0; transition: all 0.2s; display: none; }
    .shuffle-btn:hover { background: var(--accent); color: var(--bg); }
    .shuffle-btn.show { display: block; }

    /* ─── Home ─── */
    .home { padding: 48px 24px; max-width: 1100px; margin: 0 auto; }
    .hero { text-align: center; margin-bottom: 48px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2), #7ee8fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; line-height: 1.2; }
    .hero p { color: var(--text2); font-size: 17px; line-height: 1.6; }
    .vibe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .vibe-card { height: 200px; border-radius: 16px; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s ease; background-size: cover; background-position: center; animation: fadeUp 0.5s ease both; }
    .vibe-card:hover { transform: scale(1.03); }
    .vibe-card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
    .vibe-dots { display: flex; gap: 4px; margin-bottom: 8px; }
    .vibe-dot { width: 8px; height: 8px; border-radius: 50%; }
    .vibe-card-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: #fff; }
    .vibe-card-count { font-size: 12px; color: #bbb; margin-top: 4px; }

    /* ─── Not Found ─── */
    .not-found { text-align: center; padding: 80px 24px; max-width: 600px; margin: 0 auto; display: none; }
    .not-found.show { display: block; }
    .not-found h2 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; margin: 16px 0 8px; }
    .not-found p { color: var(--text2); font-size: 15px; margin-bottom: 32px; }
    .nf-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 32px; }
    .nf-card { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; transition: all 0.2s; }
    .nf-card:hover { border-color: var(--accent); }
    .nf-swatch { width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; }
    .nf-btn { padding: 12px 28px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }

    /* ─── Vibe Page ─── */
    .vibe-page { display: flex; height: calc(100vh - 53px); overflow: hidden; display: none; }
    .vibe-page.show { display: flex; }

    /* Left: Moodboard */
    .mood-panel { flex: 1; overflow-y: auto; padding: 20px; }
    .mood-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
    .back-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .back-btn:hover { border-color: var(--accent); }
    .mood-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; flex: 1; }
    .mood-dots { display: flex; gap: 6px; }
    .mood-dot { width: 14px; height: 14px; border-radius: 50%; }
    .masonry { column-count: 2; column-gap: 12px; }
    .masonry-item { break-inside: avoid; margin-bottom: 12px; border-radius: 14px; overflow: hidden; background: var(--surface); transition: opacity 0.6s ease; }
    .masonry-img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Right: Player */
    .player-panel { width: 360px; border-left: 1px solid var(--border); background: #0d0d14; overflow-y: auto; flex-shrink: 0; }
    .player-inner { padding: 20px 18px; }
    .np-label { font-size: 10px; letter-spacing: 2px; color: #555; font-weight: 700; margin-bottom: 14px; text-align: center; }
    .embed-wrap { margin-bottom: 20px; border-radius: 12px; overflow: hidden; }
    .embed-wrap iframe { border-radius: 12px; }
    .controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
    .ctrl-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .ctrl-btn:hover { border-color: var(--accent); }
    .vibe-shuf-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(196,161,255,0.3); background: transparent; color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .vibe-shuf-btn:hover { background: var(--accent); color: var(--bg); }
    .q-label { font-size: 10px; letter-spacing: 2px; color: #555; font-weight: 700; margin-bottom: 10px; }
    .queue { display: flex; flex-direction: column; gap: 2px; }
    .q-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
    .q-item:hover { background: #1a1a28; }
    .q-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
    .q-num { font-size: 12px; width: 18px; text-align: center; flex-shrink: 0; font-weight: 600; color: #555; }
    .q-item.active .q-num { color: var(--accent); }
    .q-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; }
    .q-item.active .q-name { color: var(--text); }
    .q-artist { font-size: 11px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .q-playing { color: var(--accent); animation: pulse 1.5s ease infinite; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    /* Mobile */
    @media (max-width: 768px) {
      .hero h1 { font-size: 28px; }
      .vibe-grid { grid-template-columns: repeat(2, 1fr); }
      .vibe-page.show { flex-direction: column; }
      .player-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); max-height: 50vh; }
      .mood-panel { max-height: 50vh; }
      .masonry { column-count: 2; }
      .nf-grid { grid-template-columns: 1fr; }
    }
  </style>

  <!-- ─── Top Bar ─── -->

    </div>
    <button class="shuffle-btn" id="shuffleVibeBtn" onclick="shuffleVibe()">Shuffle Vibe</button>
  </div>

  <!-- ─── Home Page ─── -->

    </div>
    <div class="vibe-grid" id="vibeGrid"></div>
  </div>

  <!-- ─── Not Found ─── -->

    <div style="font-size:48px">🔍</div>
    <h2>We don't have that vibe yet</h2>
    <p>But here are some you might like:</p>
    <div class="nf-grid" id="nfGrid"></div>
    <button class="nf-btn" onclick="goHome()">Explore all vibes</button>
  </div>

  <!-- ─── Vibe Page ─── -->
  <div class="vibe-page" id="vibePage">
    <div class="mood-panel" id="moodPanel">
      <div class="mood-header">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <div class="mood-title" id="moodTitle"></div>
        <div class="mood-dots" id="moodDots"></div>
      </div>
      <div class="masonry" id="masonry"></div>
    </div>
    <div class="player-panel">
      <div class="player-inner">
        <div class="np-label">NOW PLAYING</div>
        <div class="embed-wrap" id="embedWrap"></div>
        <div class="controls">
          <button class="ctrl-btn" onclick="skipTrack(-1)">⏮</button>
          <button class="ctrl-btn" onclick="skipTrack(1)">⏭</button>
          <button class="ctrl-btn" style="font-size:16px" onclick="shuffleTracks()">🔀</button>
          <button class="vibe-shuf-btn" onclick="shuffleVibe()">New Vibe</button>
        </div>
        <div class="q-label">UP NEXT</div>
        <div class="queue" id="queue"></div>
      </div>
    </div>
  </div>

// ─── State ───
let currentVibe = null;
let currentTrackIdx = 0;

// ─── Init ───
function init() {
  renderHome();
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) {
      document.getElementById('dropdown').classList.remove('open');
    }
  });
}

// ─── Render Home ───
function renderHome() {
  const grid = document.getElementById('vibeGrid');
  grid.innerHTML = VIBES.map((v, i) => `
    <div class="vibe-card" style="background-image: url(${v.images[0]}); animation-delay: ${i * 0.04}s" onclick="selectVibe('${v.id}')">
      <div class="vibe-card-overlay">
        <div class="vibe-dots">${v.colors.map(c => `<div class="vibe-dot" style="background:${c}"></div>`).join('')}</div>
        <span class="vibe-card-name">${v.name}</span>
        <span class="vibe-card-count">${v.tracks.length} tracks</span>
      </div>
    </div>
  `).join('');
}

// ─── Navigation ───
function showPage(page) {
  document.getElementById('homePage').style.display = page === 'home' ? 'block' : 'none';
  document.getElementById('notFoundPage').classList.toggle('show', page === 'notfound');
  document.getElementById('vibePage').classList.toggle('show', page === 'vibe');
  document.getElementById('shuffleVibeBtn').classList.toggle('show', page === 'vibe');
}

function goHome() {
  currentVibe = null;
  showPage('home');
  document.getElementById('searchInput').value = '';
}

// ─── Select Vibe ───
function selectVibe(id) {
  const vibe = VIBES.find(v => v.id === id);
  if (!vibe) return;
  currentVibe = vibe;
  currentTrackIdx = 0;
  showPage('vibe');
  renderVibePage();
}

// ─── Render Vibe Page ───
function renderVibePage() {
  if (!currentVibe) return;

  document.getElementById('moodTitle').textContent = currentVibe.name;
  document.getElementById('moodDots').innerHTML = currentVibe.colors.map(c => `<div class="mood-dot" style="background:${c}"></div>`).join('');

  // Masonry images
  const heights = [240, 300, 220, 280, 260, 320, 230, 270];
  document.getElementById('masonry').innerHTML = currentVibe.images.map((img, i) => `
    <div class="masonry-item" style="height:${heights[i % 8]}px">
      <img class="masonry-img" src="${img}" alt="" onerror="this.style.display='none'; this.parentElement.style.background='${currentVibe.colors[i % 4]}'" />
    </div>
  `).join('');

  // Spotify embed
  updateEmbed();

  // Queue
  renderQueue();

  // Scroll to top
  document.getElementById('moodPanel').scrollTop = 0;
}

function updateEmbed() {
  if (!currentVibe) return;
  const track = currentVibe.tracks[currentTrackIdx];
  document.getElementById('embedWrap').innerHTML = `
    <iframe src="https://open.spotify.com/embed/track/${track.id}?utm_source=generator&theme=0"
      width="100%" height="152" frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy" style="border-radius:12px"></iframe>
  `;
}

function renderQueue() {
  if (!currentVibe) return;
  document.getElementById('queue').innerHTML = currentVibe.tracks.map((t, i) => `
    <div class="q-item ${i === currentTrackIdx ? 'active' : ''}" onclick="selectTrack(${i})">
      <div class="q-num">${i + 1}</div>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div class="q-name">${t.name}</div>
        <div class="q-artist">${t.artist}</div>
      </div>
      ${i === currentTrackIdx ? '<div class="q-playing">♪</div>' : ''}
    </div>
  `).join('');
}

// ─── Player Controls ───
function selectTrack(idx) {
  currentTrackIdx = idx;
  updateEmbed();
  renderQueue();
}

function skipTrack(dir) {
  if (!currentVibe) return;
  const len = currentVibe.tracks.length;
  currentTrackIdx = (currentTrackIdx + dir + len) % len;
  updateEmbed();
  renderQueue();
}

function shuffleTracks() {
  if (!currentVibe) return;
  currentTrackIdx = Math.floor(Math.random() * currentVibe.tracks.length);
  updateEmbed();
  renderQueue();
}

function shuffleVibe() {
  const others = VIBES.filter(v => v.id !== currentVibe?.id);
  const random = others[Math.floor(Math.random() * others.length)];
  selectVibe(random.id);
}

// ─── Search ───
function onSearch() {
  const val = document.getElementById('searchInput').value.trim().toLowerCase();
  const dropdown = document.getElementById('dropdown');

  if (!val) { dropdown.classList.remove('open'); return; }

  const matches = VIBES.filter(v => v.name.toLowerCase().includes(val));
  dropdown.classList.add('open');

  if (matches.length > 0) {
    dropdown.innerHTML = matches.slice(0, 6).map(v => `
      <div class="drop-item" onmousedown="selectVibe('${v.id}')">
        <div class="drop-dot" style="background:${v.colors[0]}"></div>
        ${v.name}
      </div>
    `).join('');
  } else {
    dropdown.innerHTML = '<div class="drop-none">No matching vibes</div>';
  }
}

function onSearchKey(e) {
  if (e.key === 'Enter') {
    const val = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!val) return;
    const match = VIBES.find(v => v.name.toLowerCase().includes(val));
    if (match) {
      selectVibe(match.id);
    } else {
      showNotFound();
    }
    document.getElementById('dropdown').classList.remove('open');
  }
}

function openDropdown() {
  const val = document.getElementById('searchInput').value.trim();
  if (val) onSearch();
}

function showNotFound() {
  currentVibe = null;
  showPage('notfound');

  const shuffled = [...VIBES].sort(() => Math.random() - 0.5).slice(0, 6);
  document.getElementById('nfGrid').innerHTML = shuffled.map(v => `
    <div class="nf-card" onclick="selectVibe('${v.id}')">
      <div class="nf-swatch" style="background:${v.gradient}"></div>
      <span>${v.name}</span>
    </div>
  `).join('');
}

// ─── Go ───
init();
</script>
